<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ZoeType</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bubblegum+Sans&family=Bungee+Shade&family=Caveat:wght@400;700&family=Fredoka:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-bg: #ffffff;
  --editor-bg: #ffffff;
}

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Fredoka', sans-serif;
  background: var(--color-bg);
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

/* ===== TOOLBAR ===== */
#toolbar {
  position: fixed;
  left: 0; right: 0;
  top: 0;
  background: #f8f9fa;
  border-bottom: 3px solid #e9ecef;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  z-index: 100;
  overflow: hidden;
}

@media (pointer: coarse) {
  #toolbar {
    top: auto;
    bottom: 0;
    border-bottom: none;
    border-top: 3px solid #e9ecef;
  }
}

.toolbar-divider {
  width: 2px;
  height: 32px;
  background: #dee2e6;
  flex-shrink: 0;
  border-radius: 1px;
}

/* ===== COLOR BUTTONS ===== */
.color-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.active { border-color: #333; transform: scale(1.15); }
.color-btn[data-color="#FFFFFF"] { border-color: #ccc; }
.color-btn[data-color="#FFFFFF"].active { border-color: #333; }

/* ===== FONT BUTTONS ===== */
.font-btn {
  height: 36px;
  padding: 0 8px;
  border-radius: 10px;
  border: 2px solid #dee2e6;
  background: white;
  cursor: pointer;
  font-size: 15px;
  flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.font-btn:hover { transform: scale(1.08); }
.font-btn.active { border-color: #4D96FF; background: #EBF3FF; }

/* ===== SIZE BUTTONS ===== */
.size-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 2px solid #dee2e6;
  background: white;
  cursor: pointer;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
}
.size-btn:hover { transform: scale(1.08); }
.size-btn.active { border-color: #4D96FF; background: #EBF3FF; }

/* ===== ICON BUTTONS ===== */
.icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 2px solid #dee2e6;
  background: white;
  cursor: pointer;
  font-size: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { transform: scale(1.08); }
.icon-btn.active { border-color: #4D96FF; background: #EBF3FF; }

/* ===== PAGE INDICATOR ===== */
#page-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  font-family: 'Fredoka', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #666;
  padding: 0 2px;
}
.page-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #dee2e6;
  transition: background 0.2s, transform 0.2s;
}
.page-dot.active {
  background: #4D96FF;
  transform: scale(1.3);
}

/* ===== EMOJI PANEL ===== */
#emoji-panel {
  position: fixed;
  left: 0; right: 0;
  background: white;
  border-top: 3px solid #e9ecef;
  z-index: 99;
  display: none;
  flex-direction: column;
}
#emoji-panel.open { display: flex; }

@media (pointer: coarse) {
  #emoji-panel { bottom: 0; padding-bottom: 80px; }
}
@media (pointer: fine) {
  #emoji-panel { bottom: 0; }
}

#emoji-grid {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 8px 12px;
  overflow: hidden;
}

.emoji-category-label {
  font-size: 22px;
  padding: 6px 4px 2px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  color: #888;
}
.emoji-category-label span { font-size: 14px; }

.emoji-category-row {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
}

.emoji-item {
  width: 48px; height: 48px;
  border: none;
  background: none;
  font-size: 32px;
  cursor: pointer;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s, background 0.12s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.emoji-item:hover { background: #f0f0f0; transform: scale(1.15); }
.emoji-item:active { transform: scale(0.95); }

/* ===== THEME PANEL ===== */
#theme-panel {
  position: fixed;
  left: 0; right: 0;
  background: white;
  border-top: 3px solid #e9ecef;
  z-index: 99;
  display: none;
  flex-direction: column;
}
#theme-panel.open { display: flex; }

@media (pointer: coarse) {
  #theme-panel { bottom: 0; padding-bottom: 80px; }
}
@media (pointer: fine) {
  #theme-panel { bottom: 0; }
}

#theme-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  padding: 16px;
  justify-content: center;
}

.theme-card {
  width: 130px;
  height: 100px;
  border-radius: 18px;
  border: 4px solid #dee2e6;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bubblegum Sans', cursive;
  font-size: 44px;
  padding: 0;
  flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.theme-card:hover { transform: scale(1.06); }
.theme-card.active { border-color: #4D96FF; transform: scale(1.06); }

/* Name pill at the bottom of each card — readable on any background */
.theme-card-label {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 14px;
  padding: 3px 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: rgba(255,255,255,0.85);
  color: #444;
}

/* Per-theme preview backgrounds (mirror the real themes) */
.theme-card.preview-default    { background: #ffffff; color: #2C3E50; }
.theme-card.preview-lined {
  background: #fffef5; color: #2C3E50;
  background-image: repeating-linear-gradient(transparent, transparent 22px, #c8e0f4 22px, #c8e0f4 24px);
}
.theme-card.preview-chalkboard { background: #2d4a22; color: #f0f0f0; }
.theme-card.preview-sky        { background: linear-gradient(180deg, #87CEEB 0%, #c8e6f5 50%, #E0F7FA 100%); color: #2C3E50; }
.theme-card.preview-space {
  background: #0a0a2e; color: #f0f0f0;
  background-image:
    radial-gradient(2px 2px at 20px 24px, white, transparent),
    radial-gradient(1px 1px at 64px 52px, rgba(255,255,255,0.85), transparent),
    radial-gradient(2px 2px at 102px 28px, white, transparent),
    radial-gradient(1px 1px at 44px 68px, white, transparent),
    radial-gradient(2px 2px at 112px 66px, rgba(255,255,255,0.8), transparent);
}

/* ===== EDITOR ===== */
#editor {
  width: 100%;
  height: 100%;
  padding: 20px 30px;
  font-size: 72px;
  line-height: 1.3;
  font-family: 'Bubblegum Sans', cursive;
  color: #2C3E50;
  outline: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  word-wrap: break-word;
  overflow-wrap: break-word;
  caret-color: #FF6B6B;
  background: var(--editor-bg);
  -webkit-user-select: text;
  user-select: text;
  transition: background 0.4s, color 0.4s;
}

#editor:empty::before {
  content: "Hi Zoe! Start typing! 🌈";
  color: #ccc;
  pointer-events: none;
  font-family: 'Bubblegum Sans', cursive;
}

/* Dynamic padding set by JS based on toolbar height */

/* ===== LETTER ANIMATION ===== */
@keyframes pop-in {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.2) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.letter-pop {
  display: inline-block;
  animation: pop-in 0.25s ease-out;
}

/* ===== THEMES ===== */
.theme-default { --editor-bg: #ffffff; }

.theme-lined { --editor-bg: #fffef5; }
.theme-lined #editor {
  background-image: repeating-linear-gradient(
    transparent, transparent 88px,
    #c8e0f4 88px, #c8e0f4 90px
  );
  background-position-y: 10px;
}

.theme-chalkboard { --editor-bg: #2d4a22; }
.theme-chalkboard #editor { color: #f0f0f0; caret-color: #fff; }
.theme-chalkboard #editor:empty::before { color: rgba(255,255,255,0.3); }

.theme-sky { --editor-bg: #87CEEB; }
.theme-sky #editor { background: linear-gradient(180deg, #87CEEB 0%, #c8e6f5 40%, #E0F7FA 100%); }

.theme-space { --editor-bg: #0a0a2e; }
.theme-space #editor {
  background: #0a0a2e;
  color: #f0f0f0;
  caret-color: #FFD93D;
  background-image:
    radial-gradient(2px 2px at 20px 30px, white, transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 90px 40px, white, transparent),
    radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
    radial-gradient(1px 1px at 200px 60px, white, transparent),
    radial-gradient(2px 2px at 300px 100px, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 400px 50px, white, transparent),
    radial-gradient(2px 2px at 500px 150px, white, transparent),
    radial-gradient(1px 1px at 600px 80px, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 700px 130px, white, transparent);
  background-size: 800px 200px;
}
.theme-space #editor:empty::before { color: rgba(255,255,255,0.3); }

/* ===== FULLSCREEN PROMPT ===== */
#fullscreen-prompt {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  z-index: 200;
}
#fullscreen-prompt.show { display: flex; }

#reenter-fullscreen {
  background: #4D96FF;
  color: white;
  border: none;
  border-radius: 24px;
  padding: 24px 48px;
  font-size: 32px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
  touch-action: manipulation;
}
#reenter-fullscreen:hover { transform: scale(1.08); }

/* Deliberately small, muted escape hatch so you don't get trapped re-entering.
   The toddler is on the keyboard only — just the touchpad-using parent aims here. */
#confirm-exit-fullscreen {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-family: 'Fredoka', sans-serif;
  font-size: 15px;
  padding: 6px 12px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  touch-action: manipulation;
  transition: color 0.15s;
}
#confirm-exit-fullscreen:hover { color: rgba(255,255,255,0.9); }

/* ===== VIRTUAL CURSOR ===== */
/* When pointer-locked we hide the real cursor everywhere and draw our own. */
body.locked, body.locked * { cursor: none !important; }

#virtual-cursor {
  position: fixed;
  top: 0; left: 0;
  width: 30px; height: 30px;
  pointer-events: none;       /* never caught by elementFromPoint / clicks */
  z-index: 9999;
  display: none;
  will-change: transform;
  transform: translate3d(-100px, -100px, 0);
  transition: none;
}
#virtual-cursor svg {
  width: 100%; height: 100%;
  display: block;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
}
#virtual-cursor.pressing { transform-origin: 4px 4px; }
#virtual-cursor.pressing svg { transform: scale(0.8); transition: transform 0.06s ease-out; }

/* Hover feedback for the virtual cursor (real :hover can't fire under pointer lock) */
.vc-hover { filter: brightness(1.06); }
button.vc-hover { transform: scale(1.12); }
.color-btn.vc-hover { transform: scale(1.15); }
.emoji-item.vc-hover { background: #f0f0f0; transform: scale(1.15); }
button.vc-press { transform: scale(0.9) !important; }

/* ===== PRINT ===== */
@media print {
  #toolbar, #emoji-panel, #fullscreen-prompt, #virtual-cursor { display: none !important; }
  #editor {
    font-size: 36px !important;
    padding: 20px !important;
    min-height: auto !important;
    height: auto !important;
    overflow: visible !important;
  }
}
</style>
</head>

<script>
// ===== STATE =====
let currentColor = '#FF6B6B';
let currentFont = "'Bubblegum Sans', cursive";
let currentSize = '72px';
let soundEnabled = true;
let currentThemeIndex = 0;
let pages = [{ content: '' }];
let currentPage = 0;
let rainbowMode = false;
let rainbowIndex = 0;
let audioCtx = null;
let hasEnteredFullscreen = false;
let pointerLocked = false;

const rainbowColors = ['#FF6B6B','#FFA94D','#FFD93D','#6BCB77','#4D96FF','#9B59B6','#FF69B4'];

const themeData = [
  { cls: 'theme-default',    preview: 'preview-default',    icon: '📝', name: 'Paper' },
  { cls: 'theme-lined',      preview: 'preview-lined',      icon: '📓', name: 'Lines' },
  { cls: 'theme-chalkboard', preview: 'preview-chalkboard', icon: '🏫', name: 'Chalk' },
  { cls: 'theme-sky',        preview: 'preview-sky',        icon: '🌤️', name: 'Sky'  },
  { cls: 'theme-space',      preview: 'preview-space',      icon: '🚀', name: 'Space' },
];

const emojiCategories = {
  '😀 Faces':   ['😀','😂','🥰','😍','🤩','😜','😎','🤗','🥳','😺','👻','🤖','👽','🦄','🌈','😇','🤠','🥹','😻','🫶'],
  '🐶 Animals': ['🐶','🐱','🐰','🦊','🐻','🐼','🐸','🐵','🦁','🐯','🐮','🐷','🐔','🦋','🐢','🐙','🦕','🐳','🐠','🦩'],
  '🍎 Food':    ['🍎','🍌','🍕','🍩','🍦','🧁','🍪','🍫','🌮','🍔','🥕','🍇','🍓','🍉','🥤','🍭','🎂','🥞','🍿','🧃'],
  '🌸 Nature':  ['🌸','🌻','🌲','⭐','🌙','☀️','🌊','❄️','🔥','🍄','🌵','🪻','🌺','🍀','🪴','🌏','💧','🪨','🏔️','🌋'],
  '⚽ Fun':     ['⚽','🏀','🎨','🎵','🎪','🎭','🎯','🧩','🪁','🎈','🎉','🏆','🚀','✈️','🚗','🚂','🛸','🎸','🥁','🎹'],
  '❤️ Hearts':  ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💖','💝','💕','💗','🫶','✨','💫','🌟','⭐','💎','🎀','👑'],
};

// ===== DOM REFS =====
const editor = document.getElementById('editor');
const toolbar = document.getElementById('toolbar');
const emojiPanel = document.getElementById('emoji-panel');
const emojiGrid = document.getElementById('emoji-grid');
const themePanel = document.getElementById('theme-panel');
const themeGrid = document.getElementById('theme-grid');
const fullscreenPrompt = document.getElementById('fullscreen-prompt');
const pageIndicator = document.getElementById('page-indicator');

// ===== DYNAMIC TOOLBAR HEIGHT =====
// Since toolbar wraps, measure its actual height and set editor padding accordingly.
function updateEditorPadding() {
  const h = toolbar.offsetHeight;
  const isCoarse = window.matchMedia('(pointer: coarse)').matches;
  if (isCoarse) {
    editor.style.paddingTop = '20px';
    editor.style.paddingBottom = (h + 20) + 'px';
  } else {
    editor.style.paddingTop = (h + 20) + 'px';
    editor.style.paddingBottom = '20px';
  }
}
// Run on load + resize
updateEditorPadding();
window.addEventListener('resize', updateEditorPadding);
new ResizeObserver(updateEditorPadding).observe(toolbar);

// ===== SESSION TIMEOUT =====
// If it's been more than 30 minutes since the app was last used, open on a
// fresh blank page instead of dropping the child back into whatever was on
// screen last time. Previous pages are kept and still reachable via ◀ / ▶.
const SESSION_TIMEOUT_MS = 30 * 60 * 1000;

function isBlankContent(html) {
  if (!html) return true;
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return !tmp.textContent.trim();
}

function markActive() {
  try { localStorage.setItem('zoetype-last-active', String(Date.now())); }
  catch (e) { /* storage full, ignore */ }
}

// ===== LOAD SAVED DATA =====
(function loadSaved() {
  try {
    const saved = localStorage.getItem('zoetype-pages');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) pages = parsed;
    }
  } catch (e) { /* ignore corrupt data */ }

  const lastActive = parseInt(localStorage.getItem('zoetype-last-active'), 10);
  const stale = isNaN(lastActive) || (Date.now() - lastActive > SESSION_TIMEOUT_MS);

  if (stale) {
    // Start fresh — but reuse a trailing blank page if one's already there, so
    // empties don't pile up across sessions.
    if (!isBlankContent(pages[pages.length - 1].content)) pages.push({ content: '' });
    currentPage = pages.length - 1;
  } else {
    currentPage = 0;
  }

  editor.innerHTML = pages[currentPage].content;
  markActive();
})();

// ===== HELPER: INSERT STYLED CHAR AT CURSOR =====
function insertStyledChar(char) {
  const span = document.createElement('span');
  span.textContent = char;
  if (rainbowMode) {
    span.style.color = rainbowColors[rainbowIndex % rainbowColors.length];
    rainbowIndex++;
  } else {
    span.style.color = currentColor;
  }
  span.style.fontFamily = currentFont;
  span.style.fontSize = currentSize;
  // Each char span is display:inline-block (for the pop animation); a lone space
  // inside an inline-block collapses to zero width, so preserve whitespace here.
  // Line wrapping still works because every letter is its own inline-block box.
  span.style.whiteSpace = 'pre';
  span.classList.add('letter-pop');
  return span;
}

// ===== LINE BREAK =====
// Insert a <br> at the caret. We do this manually (rather than via
// execCommand('insertLineBreak'), which nests the break inside the current
// character span) so the DOM stays flat: our typing handler always leaves the
// caret positioned *after* each character span at the top level.
function insertLineBreak() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  range.deleteContents();

  // The caret may sit *inside* a character span's text node — this happens
  // whenever it was repositioned via the virtual cursor, since
  // caretRangeFromPoint returns an offset within the span's text node (offset 0
  // = before the letter, offset 1 = after). Inserting the <br> there nests it
  // inside the inline-block span (<span>H<br></span>), which doesn't break the
  // line normally and makes the text appear to split mid-character. Hoist the
  // insertion point out to a boundary between the editor's direct children so
  // the <br> always lands *between* character spans, never inside one.
  if (range.startContainer !== editor) {
    const c = range.startContainer;
    const atEnd = c.nodeType === Node.TEXT_NODE
      ? range.startOffset >= c.length
      : range.startOffset >= c.childNodes.length;
    // Climb to the node that is a direct child of the editor.
    let node = c;
    while (node.parentNode && node.parentNode !== editor) node = node.parentNode;
    if (node.parentNode === editor) {
      if (atEnd) range.setStartAfter(node);
      else range.setStartBefore(node);
      range.collapse(true);
    }
  }

  const br = document.createElement('br');
  range.insertNode(br);

  // When the break is inserted at the very end of the content, a single trailing
  // <br> is needed so the new (empty) line actually renders — a lone trailing
  // <br> otherwise collapses visually. Only add it when nothing follows the
  // break; if a trailing pad already exists (e.g. from a previous Enter), reuse
  // it rather than stacking up extra blank lines.
  if (!br.nextSibling) {
    br.parentNode.appendChild(document.createElement('br'));
  }

  const newRange = document.createRange();
  newRange.setStartAfter(br);
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);
}

// ===== KEY REPEAT SUPPRESSION =====
editor.addEventListener('keydown', (e) => {
  // Block key repeat
  if (e.repeat) {
    e.preventDefault();
    return;
  }

  // Block dangerous shortcuts (but allow Cmd+Z undo, Cmd+Shift+Z redo, Cmd+A select all)
  if (e.metaKey || e.ctrlKey) {
    const allowed = ['z', 'a'];
    if (!allowed.includes(e.key.toLowerCase())) {
      e.preventDefault();
      return;
    }
  }

  // Block function keys
  if (e.key.startsWith('F') && e.key.length > 1 && !isNaN(e.key.slice(1))) {
    e.preventDefault();
    return;
  }

  // Tab must never move focus out of the editor (it would strand the toddler
  // on a toolbar button where typing does nothing). Swallow it.
  if (e.key === 'Tab') {
    e.preventDefault();
    return;
  }

  // Handle Enter — insert a line break at the cursor.
  if (e.key === 'Enter') {
    e.preventDefault();
    insertLineBreak();
    playKeySound('Enter');
    scheduleSave();
    return;
  }

  // Play sound for printable keys
  if (e.key.length === 1) {
    playKeySound(e.key);
  }
  // Sound for backspace/delete
  if (e.key === 'Backspace' || e.key === 'Delete') {
    playKeySound('_delete');
  }
});

// ===== TEXT INPUT — WRAP CHARS IN STYLED SPANS =====
editor.addEventListener('beforeinput', (e) => {
  // Handle both regular text and space (insertText covers both)
  if (e.inputType === 'insertText' && e.data) {
    e.preventDefault();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();

    for (const char of e.data) {
      const span = insertStyledChar(char);
      range.insertNode(span);
      range.setStartAfter(span);
      range.collapse(true);
    }

    sel.removeAllRanges();
    sel.addRange(range);
    scheduleSave();
  }
});

// ===== SPACEBAR FIX =====
// Some browsers treat space in contenteditable specially and don't fire
// beforeinput with insertText. Catch it explicitly.
editor.addEventListener('keydown', (e) => {
  if (e.key === ' ' && !e.repeat && !e.metaKey && !e.ctrlKey) {
    // We let it through in keydown, but if beforeinput doesn't fire for space,
    // we handle it in the keypress/input fallback below.
  }
});

// Additional fallback: if a space was inserted as raw text (not via our spans),
// observe mutations and wrap naked text nodes.
const observer = new MutationObserver((mutations) => {
  for (const mut of mutations) {
    if (mut.type === 'childList') {
      for (const node of mut.addedNodes) {
        if (node.nodeType === 3 && node.textContent.trim() === '' && node.textContent.includes(' ')) {
          // Naked space text node — wrap it in a styled span
          const span = insertStyledChar(node.textContent);
          node.parentNode.replaceChild(span, node);
          // Move cursor after the span
          const sel = window.getSelection();
          const range = document.createRange();
          range.setStartAfter(span);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }
    }
  }
});
observer.observe(editor, { childList: true, subtree: true });

// ===== PASTE — STRIP FORMATTING =====
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  if (!text) return;
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  range.deleteContents();

  for (const char of text) {
    if (char === '\n') {
      const br = document.createElement('br');
      range.insertNode(br);
      range.setStartAfter(br);
    } else {
      const span = insertStyledChar(char);
      range.insertNode(span);
      range.setStartAfter(span);
    }
    range.collapse(true);
  }
  sel.removeAllRanges();
  sel.addRange(range);
  scheduleSave();
});

// ===== SAVE / INPUT CHANGE TRACKING =====
editor.addEventListener('input', scheduleSave);

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(savePages, 400);
}

function savePages() {
  pages[currentPage].content = editor.innerHTML;
  try {
    localStorage.setItem('zoetype-pages', JSON.stringify(pages));
  } catch (e) { /* storage full, ignore */ }
  markActive();
}

// ===== EMOJI PANEL — SINGLE LEVEL, ALL CATEGORIES, NO SCROLL =====
function buildEmojiPanel() {
  emojiGrid.innerHTML = '';

  const categoryCount = Object.keys(emojiCategories).length; // 6
  const panelWidth = window.innerWidth - 24; // padding
  const emojiW = 50; // item width + gap
  const emojisPerRow = Math.floor(panelWidth / emojiW);

  // Calculate available height for the emoji panel.
  // We want it to fit without scrolling. Leave room for toolbar + some editor.
  const toolbarH = toolbar.offsetHeight;
  const availableH = window.innerHeight - toolbarH - 40; // 40px breathing room
  // Each category takes: ~30px header + (rows * 50px per row)
  // Budget per category:
  const perCategoryBudget = Math.floor(availableH / categoryCount);
  const headerH = 34; // header height
  const rowH = 50; // emoji row height
  const rowsPerCategory = Math.max(1, Math.floor((perCategoryBudget - headerH) / rowH));
  const maxEmoji = rowsPerCategory * emojisPerRow;

  for (const [label, emojis] of Object.entries(emojiCategories)) {
    const header = document.createElement('div');
    header.className = 'emoji-category-label';
    header.textContent = label;
    emojiGrid.appendChild(header);

    const row = document.createElement('div');
    row.className = 'emoji-category-row';
    const showEmojis = emojis.slice(0, maxEmoji);
    for (const em of showEmojis) {
      const btn = document.createElement('button');
      btn.className = 'emoji-item';
      btn.textContent = em;
      btn.addEventListener('click', () => insertEmoji(em));
      row.appendChild(btn);
    }
    emojiGrid.appendChild(row);
  }
}

function insertEmoji(emoji) {
  editor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) {
    const range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  const range = sel.getRangeAt(0);
  range.deleteContents();
  const span = document.createElement('span');
  span.textContent = emoji;
  span.style.fontSize = currentSize;
  span.classList.add('letter-pop');
  range.insertNode(span);
  range.setStartAfter(span);
  range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
  playKeySound(emoji);
  scheduleSave();
}

buildEmojiPanel();

window.addEventListener('resize', () => {

// instead of blind-cycling through them.
function buildThemePanel() {
  themeGrid.innerHTML = '';

    card.dataset.index = i;

    card.addEventListener('click', () => applyTheme(i));

}

function applyTheme(index) {
  currentThemeIndex = index;
  // Swap only the theme class so we don't clobber `locked` (set during pointer
  // lock in fullscreen, which is exactly when this panel gets used).
  themeData.forEach(t => document.body.classList.remove(t.cls));
  document.body.classList.add(themeData[index].cls);
  themeGrid.querySelectorAll('.theme-card').forEach((c, i) => {

// ===== SOUND =====
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playKeySound(key) {
  if (!soundEnabled) return;
  initAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  if (key === '_delete') {
    osc.frequency.value = 220;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
    return;
  }

  const pentatonic = [0, 2, 4, 7, 9];
  let offset = 0;
  if (key.length === 1) {
    offset = key.toLowerCase().charCodeAt(0) % 15;
  } else {
    offset = Math.floor(Math.random() * 10);
  }
  const baseFreq = 523.25;
  const semitones = pentatonic[offset % 5] + Math.floor(offset / 5) * 12;
  const freq = baseFreq * Math.pow(2, semitones / 12);

  osc.frequency.value = freq;
  osc.type = 'triangle';
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

document.getElementById('sound-toggle').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
});

  } else {

  }

});

}

function switchPage(index) {

  currentPage = index;

  updatePageIndicator();

document.getElementById('new-page').addEventListener('click', () => {

updatePageIndicator();

// ===== FULLSCREEN + POINTER LOCK + VIRTUAL CURSOR =====
// In fullscreen we lock the real OS pointer (so it can't reach the menu bar,
// dock, hot corners, or trigger swipe-to-switch) and draw our OWN cursor that
// moves with the trackpad's OS-accelerated deltas — so it feels native, but
// is fully contained inside the app.

const cursorEl = document.getElementById('virtual-cursor');
const CURSOR_SENSITIVITY = 1.0;      // 1:1 with macOS pointer speed → native feel
const vc = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
let hoverEl = null;
let pressBtn = null;
let lastLockAttempt = 0;
let cursorPlaced = false;   // false until the cursor has been positioned once

function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

function renderCursor() {
  // Arrow tip sits a few px in from the SVG's top-left corner.
  cursorEl.style.transform = 'translate3d(' + (vc.x - 3) + 'px,' + (vc.y - 2) + 'px,0)';
}

function clearHover() {
  if (hoverEl) { hoverEl.classList.remove('vc-hover'); hoverEl = null; }
}

// --- Hit testing (the virtual cursor is pointer-events:none, so it's ignored) ---
function buttonAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest('button') : null;
}
function isEditorAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return !!el && (el === editor || editor.contains(el));
}

function placeCaretAtPoint(x, y) {
  let range = null;
  if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(x, y);
  } else if (document.caretPositionFromPoint) {
    const p = document.caretPositionFromPoint(x, y);
    if (p) { range = document.createRange(); range.setStart(p.offsetNode, p.offset); range.collapse(true); }
  }
  editor.focus();
  if (range) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

// --- Pointer lock acquisition ---
function requestLock() {
  const el = document.documentElement;
  if (!el.requestPointerLock) return;
  try {
    const p = el.requestPointerLock();   // default = OS-accelerated (native) movement
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
}

// Auto-heal: if we're in fullscreen but lost the lock (e.g. a stray Esc), grab
// it again on the next interaction — respecting Chrome's ~1.25s re-lock cooldown.
function maybeRelock() {
  if (!hasEnteredFullscreen) return;
  if (!document.fullscreenElement) return;     // the big prompt covers this case
  if (document.pointerLockElement) return;
  const now = Date.now();
  if (now - lastLockAttempt < 1300) return;
  lastLockAttempt = now;
  requestLock();
}

function enterLockedFullscreen() {
  hasEnteredFullscreen = true;
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    try {
      const fp = el.requestFullscreen ? el.requestFullscreen() : null;
      if (fp && fp.catch) fp.catch(() => {});
    } catch (e) {}
  }
  // Request the lock in the SAME user gesture (canonical Chrome pattern — most
  // reliable). The fullscreenchange handler and maybeRelock() are backups in
  // case this attempt is rejected.
  requestLock();
}

function updatePrompt() {
  if (hasEnteredFullscreen && !document.fullscreenElement) {
    fullscreenPrompt.classList.add('show');
  } else {
    fullscreenPrompt.classList.remove('show');
  }
}

document.getElementById('fullscreen-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    enterLockedFullscreen();
  } else {
    document.exitFullscreen().catch(() => {});
  }
});

document.getElementById('reenter-fullscreen').addEventListener('click', () => {
  enterLockedFullscreen();
});

// Deliberate opt-out: stop nagging and stay in the normal windowed view. The
// ⛶ toolbar button re-enters locked fullscreen whenever you want it back.
document.getElementById('confirm-exit-fullscreen').addEventListener('click', () => {
  hasEnteredFullscreen = false;
  updatePrompt();
});

document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    requestLock();                              // grab the pointer as soon as we're fullscreen
  } else if (document.pointerLockElement) {
    document.exitPointerLock();
  }
  updatePrompt();
});

document.addEventListener('pointerlockchange', () => {
  pointerLocked = !!document.pointerLockElement;
  document.body.classList.toggle('locked', pointerLocked);
  cursorEl.style.display = pointerLocked ? 'block' : 'none';
  if (pointerLocked) {
    // Center on the first lock for a predictable start; on later re-locks (e.g.
    // after a stray Esc) keep the last position unless it has drifted off-screen.
    const offscreen = vc.x < 0 || vc.y < 0 || vc.x > window.innerWidth || vc.y > window.innerHeight;
    if (!cursorPlaced || offscreen) {
      vc.x = window.innerWidth / 2;
      vc.y = window.innerHeight / 2;
      cursorPlaced = true;
    }
    renderCursor();
    editor.focus();
  } else {
    clearHover();
  }
});
document.addEventListener('pointerlockerror', () => { /* swallow; auto-heal will retry */ });

// --- Virtual cursor movement (only while locked) ---
let hoverScheduled = false;
function refreshHover() {
  hoverScheduled = false;
  const btn = buttonAt(vc.x, vc.y);
  if (btn !== hoverEl) {
    if (hoverEl) hoverEl.classList.remove('vc-hover');
    hoverEl = btn;
    if (hoverEl) hoverEl.classList.add('vc-hover');
  }
}
document.addEventListener('mousemove', (e) => {
  if (!pointerLocked) return;
  vc.x = clamp(vc.x + e.movementX * CURSOR_SENSITIVITY, 0, window.innerWidth - 1);
  vc.y = clamp(vc.y + e.movementY * CURSOR_SENSITIVITY, 0, window.innerHeight - 1);
  renderCursor();                       // cheap (compositor transform), do every event
  if (!hoverScheduled) {                // hit-test at most once per frame
    hoverScheduled = true;
    requestAnimationFrame(refreshHover);
  }
});

// --- Virtual cursor press / release (trusted events only; .click() is synthetic) ---
document.addEventListener('mousedown', (e) => {
  maybeRelock();
  if (!pointerLocked) return;
  e.preventDefault();
  e.stopPropagation();
  cursorEl.classList.add('pressing');
  const btn = buttonAt(vc.x, vc.y);
  if (btn) {
    pressBtn = btn;
    btn.classList.add('vc-press');
  } else {
    pressBtn = null;
    if (isEditorAt(vc.x, vc.y)) {
      placeCaretAtPoint(vc.x, vc.y);
      closeEmojiPanel();
      closeThemePanel();
    }
  }
}, true);

document.addEventListener('mouseup', (e) => {
  if (!pointerLocked) return;
  e.preventDefault();
  e.stopPropagation();
  cursorEl.classList.remove('pressing');
  if (pressBtn) {
    pressBtn.classList.remove('vc-press');
    if (buttonAt(vc.x, vc.y) === pressBtn) pressBtn.click();  // synthetic → passes the swallow filter
    pressBtn = null;
  }
}, true);

// Swallow the real (trusted) click + dblclick that pointer lock fires at the
// lock origin, so they can't activate whatever sits under the screen center or
// select a random word. Our synthetic .click() (isTrusted=false) passes through.
['click', 'dblclick'].forEach((ev) => {
  document.addEventListener(ev, (e) => {
    if (pointerLocked && e.isTrusted) { e.preventDefault(); e.stopPropagation(); }
  }, true);
});

// --- Scrolling & zoom guards ---
document.addEventListener('wheel', (e) => {
  if (e.ctrlKey) { e.preventDefault(); return; }   // block pinch / ctrl+wheel zoom
  if (pointerLocked) {
    editor.scrollTop += e.deltaY;                   // two-finger scroll → scroll the page
    e.preventDefault();
  }
}, { passive: false });

// Re-lock on keypress too (cheap auto-heal after a stray Esc).
document.addEventListener('keydown', maybeRelock, true);

window.addEventListener('resize', () => {
  vc.x = clamp(vc.x, 0, window.innerWidth - 1);
  vc.y = clamp(vc.y, 0, window.innerHeight - 1);
  if (pointerLocked) renderCursor();
});

// ===== PREVENT ACCIDENTAL EXIT =====
window.addEventListener('beforeunload', (e) => {
  if (editor.innerHTML.trim()) {
    e.preventDefault();
  }
});

// ===== PREVENT CONTEXT MENU =====
document.addEventListener('contextmenu', (e) => {
  e.preventDefault();
});

// ===== TRAP HISTORY NAVIGATION (two-finger swipe back/forward) =====
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.pushState(null, '', location.href);
});

// ===== PREVENT DRAG & DROP (dragging text out / dropping files in) =====
['dragstart', 'dragover', 'drop'].forEach((ev) => {
  document.addEventListener(ev, (e) => e.preventDefault());
});

// ===== FOCUS EDITOR ON LOAD =====
editor.focus();

// ===== PRINT =====
document.getElementById('print-btn').addEventListener('click', () => {
  window.print();
});

// ===== CLICK OUTSIDE EMOJI PANEL TO CLOSE =====
editor.addEventListener('click', () => {
  if (emojiPanel.classList.contains('open')) {
    closeEmojiPanel();
  }
  if (themePanel.classList.contains('open')) {
    closeThemePanel();
  }
});

// ===== KEEP TYPING FOCUS ON THE EDITOR =====
// All toolbar controls are click-driven, so after any toolbar interaction we
// return keyboard focus to the editor. This guarantees a child banging the keys
// always types into the page instead of getting "stuck" on a focused button
// (where Space/Enter would re-trigger the button and letters would do nothing).
// Runs after the button's own handler (bubble order), so its action still fires.
toolbar.addEventListener('click', () => { editor.focus(); });
</script>
</body>
</html>
